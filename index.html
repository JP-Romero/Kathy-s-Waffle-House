<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda Online</title>
    <style>
        /* --- ESTILOS CSS (DISEÑO) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        /* Cabecera */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 { margin: 0; }

        /* Contenedor de productos */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            /* Esto crea una cuadrícula automática adaptable a móviles */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px;
        }

        /* Tarjeta del producto */
        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px); /* Efecto al pasar el mouse */
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Ajusta la imagen sin deformarla */
            background-color: #ddd;
        }

        .product-info {
            padding: 20px;
            flex-grow: 1; /* Empuja el botón hacia abajo */
            display: flex;
            flex-direction: column;
        }

        .product-title {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: #2c3e50;
        }

        .product-description {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #27ae60;
        }

        .btn-buy {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-buy:hover {
            background-color: #d35400;
        }

        /* Footer simple */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #2c3e50;
            color: white;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Kathy´s Waffle House</h1>
        <p>Los mejores productos al mejor precio</p>
    </header>

    <!-- Aquí se cargarán los productos -->
    <div class="container" id="product-list">
        <!-- Los productos se insertan aquí con JavaScript -->
    </div>

    <footer>
        <p>&copy; 2026 Kathy´s Waffle House - Todos los derechos reservados</p>
    </footer>

    <script>
        /* --- LÓGICA JAVASCRIPT --- */

        // 1. Datos de los productos (Simulando una base de datos)
        // Puedes cambiar las URLs de las imágenes por las tuyas
        const productos = [
            {
                id: 1,
                nombre: " Waffle",
                descripcion: "Zapatillas ligeras ideales para correr y entrenar. Suela de goma antideslizante.",
                precio: 49.99,
                imagen: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 2,
                nombre: "Reloj Inteligente",
                descripcion: "Monitorea tu salud, recibe notificaciones y controla tu música desde tu muñeca.",
                precio: 89.50,
                imagen: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 3,
                nombre: "Audífonos Bluetooth",
                descripcion: "Sonido de alta fidelidad con cancelación de ruido. Batería de 20 horas.",
                precio: 35.00,
                imagen: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            },
            {
                id: 4,
                nombre: "Cámara Vintage",
                descripcion: "Cámara analógica restaurada. Perfecta para capturar momentos con estilo retro.",
                precio: 120.00,
                imagen: "https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80"
            }
        ];

        // 2. Función para mostrar los productos en el HTML
        const contenedor = document.getElementById('product-list');

        function renderizarProductos() {
            productos.forEach(producto => {
                // Crear el HTML de cada tarjeta
                const tarjetaHTML = `
                    <div class="product-card">
                        <img src="${producto.imagen}" alt="${producto.nombre}" class="product-image">
                        <div class="product-info">
                            <h3 class="product-title">${producto.nombre}</h3>
                            <p class="product-description">${producto.descripcion}</p>
                            <div class="product-footer">
                                <span class="price">$${producto.precio}</span>
                                <button class="btn-buy" onclick="comprar('${producto.nombre}')">Comprar</button>
                            </div>
                        </div>
                    </div>
                `;
                // Agregar al contenedor
                contenedor.innerHTML += tarjetaHTML;
            });
        }

        // 3. Función simple para el botón de comprar
        function comprar(nombreProducto) {
            alert(`¡Has agregado "${nombreProducto}" al carrito!`);
            // Aquí iría la lógica real de un carrito de compras
        }

        // Ejecutar la función al cargar la página
        renderizarProductos();

    </script>
</body>
</html>Pagina

<!-- ¿Qué hace este código? 
Diseño Responsive: He usado grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));. 
Esto significa que si ves la página en un celular, los productos se pondrán uno debajo del otro. 
Si la ves en PC, se pondrán uno al lado del otro automáticamente.
Imágenes Automáticas: He usado enlaces de Unsplash (un banco de imágenes gratuito) para que veas fotos reales de ejemplo.
Fácil de editar: En la parte de abajo (en el <script>), verás una lista llamada const productos. 
Si quieres cambiar un precio o una descripción, solo edita el texto entre comillas ahí.
¿Qué te falta para que sea una tienda real?
Este código es el "Frontend" (lo que ve el cliente). 
Para vender de verdad necesitarás:
Hosting y Dominio: Comprar un nombre (ej: mitienda.com) y pagar un servidor para subir este archivo.
Pasarela de Pagos: Para cobrar con tarjeta, necesitas integrar servicios como Stripe, PayPal o MercadoPago. 
Eso requiere programación más avanzada (Backend).
Backend: Una base de datos real para guardar los pedidos de los clientes.
Si estás empezando y quieres vender rápido sin programar tanto, te recomiendo mirar plataformas como Shopify o TiendaNube, que ya traen todo esto hecho. 
Pero si tu objetivo es aprender a programar, ¡este código es el primer paso perfecto!-->
